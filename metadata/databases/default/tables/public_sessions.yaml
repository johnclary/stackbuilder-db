table:
  name: sessions
  schema: public
object_relationships:
- name: game
  using:
    foreign_key_constraint_on: game_id
- name: user
  using:
    foreign_key_constraint_on: user_id
array_relationships:
- name: transactions
  using:
    foreign_key_constraint_on:
      column: session_id
      table:
        name: transactions
        schema: public
insert_permissions:
- permission:
    backend_only: false
    check:
      user_id:
        _eq: X-Hasura-User-Id
    columns:
    - game_id
    - is_active
    - is_deleted
    set:
      user_id: x-hasura-user-id
  role: user
select_permissions:
- permission:
    allow_aggregations: true
    columns:
    - game_id
    - id
    - is_active
    - is_deleted
    - user_id
    filter:
      user_id:
        _eq: X-Hasura-User-Id
  role: user
update_permissions:
- permission:
    check:
      user_id:
        _eq: X-Hasura-User-Id
    columns:
    - game_id
    - is_active
    - is_deleted
    filter:
      user_id:
        _eq: X-Hasura-User-Id
  role: user
